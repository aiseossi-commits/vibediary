  <circle cx="388" cy="280" r="18" fill="#051622"/>
  <circle cx="388" cy="280" r="11" fill="#EAEAEA"/>
  <circle cx="472" cy="280" r="18" fill="#051622"/>
  <circle cx="472" cy="280" r="11" fill="#EAEAEA"/>
  <circle cx="556" cy="280" r="18" fill="#051622"/>
  <circle cx="556" cy="280" r="11" fill="#EAEAEA"/>
  <circle cx="640" cy="280" r="18" fill="#051622"/>
