<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="32%" r="68%">
      <stop offset="0%" stop-color="#0D2040"/>
      <stop offset="100%" stop-color="#070D1A"/>
    </radialGradient>
    <radialGradient id="pearl" cx="38%" cy="33%" r="68%">
      <stop offset="0%" stop-color="#1A2E48"/>
      <stop offset="100%" stop-color="#0D1F35"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Pulse rings (recording animation) -->
  <circle cx="512" cy="390" r="220" fill="#60A5FA" opacity="0.04"/>
  <circle cx="512" cy="390" r="184" fill="#60A5FA" opacity="0.07"/>
  <circle cx="512" cy="390" r="150" fill="#60A5FA" opacity="0.11"/>

  <!-- Pearl body -->
  <circle cx="512" cy="390" r="122" fill="url(#pearl)" stroke="#334155" stroke-width="1.5"/>

  <!-- Pearl shimmer highlight -->
  <ellipse cx="488" cy="353" rx="20" ry="13" fill="#93C5FD" opacity="0.13" transform="rotate(-28 488 353)"/>

  <!-- Mic capsule (rounded rect) -->
  <rect x="488" y="316" width="48" height="84" rx="24" fill="#60A5FA"/>

  <!-- Mic stand arc -->
  <path d="M464,392 C464,452 560,452 560,392"
        stroke="#60A5FA" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- Mic stand pole -->
  <line x1="512" y1="452" x2="512" y2="482"
        stroke="#60A5FA" stroke-width="8" stroke-linecap="round"/>

  <!-- Mic stand base -->
  <line x1="490" y1="482" x2="534" y2="482"
        stroke="#60A5FA" stroke-width="8" stroke-linecap="round"/>

  <!-- Ocean waves: back layer -->
  <path d="M0,700 C180,658 360,720 512,682 C664,644 840,706 1024,666 L1024,1024 L0,1024 Z"
        fill="#0A1628"/>

  <!-- Ocean waves: mid layer -->
  <path d="M0,752 C160,714 340,774 512,736 C684,698 860,758 1024,720 L1024,1024 L0,1024 Z"
        fill="#1E3A5F" opacity="0.9"/>

  <!-- Ocean waves: front layer -->
  <path d="M0,804 C200,770 380,822 512,790 C644,758 820,810 1024,778 L1024,1024 L0,1024 Z"
        fill="#60A5FA" opacity="0.18"/>

  <!-- Wave shimmer line -->
  <path d="M0,804 C200,770 380,822 512,790 C644,758 820,810 1024,778"
        stroke="#93C5FD" stroke-width="2.5" fill="none" opacity="0.38" stroke-linecap="round"/>
</svg>
