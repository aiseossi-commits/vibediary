<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220">
  <defs>
    <linearGradient id="nightsky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#040810"/>
      <stop offset="100%" stop-color="#0D1F35"/>
    </linearGradient>
    <linearGradient id="nightocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#040A14"/>
    </linearGradient>
  </defs>

  <!-- Night sky -->
  <rect width="400" height="220" fill="url(#nightsky)"/>

  <!-- Stars -->
  <circle cx="34"  cy="22"  r="1.4" fill="white" opacity="0.85"/>
  <circle cx="72"  cy="12"  r="1.0" fill="white" opacity="0.65"/>
  <circle cx="118" cy="30"  r="1.6" fill="white" opacity="0.75"/>
  <circle cx="166" cy="10"  r="1.0" fill="white" opacity="0.55"/>
  <circle cx="198" cy="26"  r="1.2" fill="white" opacity="0.6"/>
  <circle cx="244" cy="16"  r="0.9" fill="white" opacity="0.45"/>
  <circle cx="52"  cy="48"  r="0.9" fill="white" opacity="0.5"/>
  <circle cx="148" cy="52"  r="1.4" fill="white" opacity="0.65"/>
  <circle cx="280" cy="44"  r="1.0" fill="white" opacity="0.5"/>
  <circle cx="340" cy="22"  r="1.2" fill="white" opacity="0.55"/>
  <circle cx="86"  cy="70"  r="0.8" fill="white" opacity="0.4"/>
  <circle cx="216" cy="60"  r="0.9" fill="white" opacity="0.45"/>

  <!-- Moon glow outer -->
  <circle cx="318" cy="52" r="36" fill="#F0E6C8" opacity="0.06"/>
  <!-- Moon glow inner -->
  <circle cx="318" cy="52" r="26" fill="#F0E6C8" opacity="0.10"/>
  <!-- Moon body -->
  <circle cx="318" cy="52" r="20" fill="#F0E6C8"/>
  <!-- Moon crescent shadow -->
  <circle cx="328" cy="46" r="18" fill="#0D2040"/>

  <!-- Ocean surface wave -->
  <path d="M0,118 C66,106 132,124 200,112 C268,100 334,118 400,108 L400,220 L0,220 Z"
        fill="url(#nightocean)"/>

  <!-- Wave shimmer line -->
  <path d="M0,118 C66,106 132,124 200,112 C268,100 334,118 400,108"
        stroke="rgba(96,165,250,0.35)" stroke-width="1.8" fill="none"/>

  <!-- Moonlight reflection on water -->
  <path d="M266,132 C290,127 316,133 340,129"
        stroke="rgba(240,230,200,0.18)" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Ocean wave lines -->
  <path d="M18,142 C58,136 96,144 140,139"
        stroke="rgba(96,165,250,0.22)" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <path d="M170,158 C214,152 264,160 316,154"
        stroke="rgba(96,165,250,0.17)" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <path d="M58,176 C106,170 158,178 212,173"
        stroke="rgba(96,165,250,0.14)" stroke-width="1.4" fill="none" stroke-linecap="round"/>
</svg>
